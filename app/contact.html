<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
</head>
<body>
    <h1>Contact Us</h1>

    <form method="POST" action="{{ url_for('contact') }}">
        {{ form.csrf_token }}

        <p>
            {{ form.name.label }}<br>
            {{ form.name }}
        </p>

        <p>
            {{ form.email.label }}<br>
            {{ form.email }}
        </p>

        <p>
            {{ form.subject.label }}<br>
            {{ form.subject }}
        </p>

        <p>
            {{ form.message.label }}<br>
            {{ form.message }}
        </p>

        <p>{{ form.submit() }}</p>
    </form>
</body>
</html>
